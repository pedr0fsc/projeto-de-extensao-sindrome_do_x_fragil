version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: xfragil_mysql_db
    restart: always
    # O Docker lê o arquivo .env automaticamente e substitui os valores abaixo
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      # Isso garante que, se você desligar o PC, os dados do banco não sumam
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: